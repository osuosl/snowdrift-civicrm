---
version: 2
updates:
  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
    # Cap concurrent PRs so grouped updates don't pile up.
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: composer
    groups:
      # Bundle all patch/minor bumps into a single PR. This keeps the
      # interdependent drupal/core-* packages moving together.
      composer-dependencies:
        update-types:
          - minor
          - patch
      # Keep major bumps grouped but separate, since they may
      # contain breaking changes that need a closer look.
      composer-dependencies-major:
        update-types:
          - major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: github-actions
    groups:
      # Bundle all GitHub Actions bumps into a single PR.
      github-actions:
        patterns:
          - "*"
